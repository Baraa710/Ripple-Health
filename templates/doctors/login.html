<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title> Doctor's Login </title>
    <link rel="stylesheet" href="platform.css">

</head>

<body>
    <div id="container">

        <div id="header"> 
            <h2> Doctor's Portal </h2>
            <p class="subheading"> View upcoming appointments, and patients. </p>
        </div>
 
        <div id="nav">
            <a href="/"> Home </a>
            <a href="/campaign"> Browse Campaigns </a>
        </div>

            <div id="content">

                <div class="card">
                    <h3>Log in</h3>
                            <form action="/doctors/dashboard" method="POST">
                                <label for="email">Email</label><br>
                                <input type="email" id="email" name="email" placeholder="doctor@gmail.com" required><br><br>

                                <label for="id">Doctors ID</label><br>
                                <input type="text" id="id" name="license_key" placeholder="P1023" required><br><br>
                                <button type="submit">Continue</button>
                            </form>

                </div>   
                <!-- Uploading an Invoice-->
                <div class="card">
                    <h3> Upload Invoice</h3>
                        <form action="/doctors/create_invoice" method="post"> 
                            <label for="patient">Patient ID</label><br>
                            <input type="text" id="patient_id" name="patient_id" placeholder="P0123" required><br><br>

                            <label for="amount">Amount (XRP)</label><br>
                            <input type="number" id="amount" name="amount" placeholder="25" required><br><br>

                            <label for="description">Treatment Description</label><br>
                            <input type="text" id="description" name="description" placeholder="MRI Scan" required><br><br>

                            <button type="submit">Create Invoice</button>
                        </form>
                </div>

            </div>
    </div>
</body>

</html>
