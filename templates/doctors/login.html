<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Doctor Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='platform.css') }}">
</head>
<body>
    <div id="container">

        <div id="header">
            <h2>Doctor's Portal</h2>
            <p class="subtitle">View upcoming appointments, and patients.</p>
        </div>

        <div id="nav">
            <a href="/">Home</a>
            <a href="/campaigns">Browse Campaigns</a>
        </div>

        <div id="content">

            <div class="card">
                <h3>Log in</h3>
                <div id="login-error" class="error-msg" style="display:none;"></div>
                <form id="login-form">
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" placeholder="doctor@gmail.com" required><br><br>

                    <label for="password">Password</label><br>
                    <input type="password" id="password" name="password" placeholder="Your password" required><br><br>

                    <button type="submit">Continue</button>
                </form>
            </div>

            <p>Don't have an account?
                <a href="/doctors/signup">Sign Up</a>
            </p>

        </div>
    </div>

    <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errEl = document.getElementById("login-error");
        errEl.style.display = "none";

        const res = await fetch("/api/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
            }),
        });

        const data = await res.json();
        if (res.ok) {
            window.location.href = "/doctors/dashboard";
        } else {
            errEl.textContent = data.error || "Login failed";
            errEl.style.display = "block";
        }
    });
    </script>
</body>
</html>
