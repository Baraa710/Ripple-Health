<!-- {% extends 'auth.html' %}### -->
<!-- {% block content %} -->
<link rel="stylesheet" href="platform.css"> 
<div class="col-xl-4 col-lg-5 col-md-7 d-flex flex-column mx-lg-0 mx-auto">
    <div class="card card-plain">
    
        <div class="card-header pb-0 text-start">
            <h4 class="font-weight-bolder">Sign Up</h4>
            <p class="mb-0">Register Account</p>
        </div>

        <div class="notification is-danger">

        </div>

        <div class="card-body">
            <form role="form" method="POST" action="{{ url_for('patients.signup') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <input type="text" name="name" class="form-control form-control-lg" placeholder="Name"
                        aria-label="Name" required>
                </div>
                <div class="mb-3">
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="Email"
                        aria-label="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Password"
                        aria-label="Password" required>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-lg btn-primary btn-lg w-100 mt-4 mb-0">Sign Up</button>
                </div>
            </form>
        </div>
        <div class="card-footer text-center pt-0 px-lg-2 px-1">
            <p class="mb-4 text-sm mx-auto">
                Already have an account?
                <a href="{{ url_for('patients.login') }}" class="text-primary text-gradient font-weight-bold">Log In</a>
            </p>
        </div>
    </div>
</div>
<!--{% endblock %}-->
