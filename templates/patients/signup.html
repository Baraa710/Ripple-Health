<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Patient Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='platform.css') }}">
</head>
<body>
    <div id="container">

        <div id="header">
            <h2>Patient Portal</h2>
            <p class="subtitle">Create your account</p>
        </div>

        <div id="nav">
            <a href="/">Home</a>
            <a href="/campaigns">Browse Campaigns</a>
        </div>

        <div id="content">

            <div class="card">
                <h3>Sign Up</h3>
                <div id="error-msg" class="error-msg" style="display:none;"></div>
                <form id="signup-form">
                    <label for="name">Name</label><br>
                    <input type="text" id="name" name="name" placeholder="Your full name" required><br><br>

                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" placeholder="patient@email.com" required><br><br>

                    <label for="password">Password</label><br>
                    <input type="password" id="password" name="password" placeholder="Choose a password" required><br><br>

                    <button type="submit">Sign Up</button>
                </form>
            </div>

            <p>Already have an account?
                <a href="/patients/login">Log In</a>
            </p>

        </div>
    </div>

    <script>
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errEl = document.getElementById("error-msg");
        errEl.style.display = "none";

        const res = await fetch("/api/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                user_type: "patient",
            }),
        });

        const data = await res.json();
        if (res.ok) {
            window.location.href = "/patients/login";
        } else {
            errEl.textContent = data.error || "Registration failed";
            errEl.style.display = "block";
        }
    });
    </script>
</body>
</html>
